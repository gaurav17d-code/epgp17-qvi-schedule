<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPGP17 · Quarter VI Platform Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --ink: #1a1a2e;
  --ink-muted: #6b6b80;
  --border: #e2dfd8;
  --accent: #c8502a;
  --today-ring: #c8502a;

  /* Area colors */
  --mm: #2563eb;
  --fac: #7c3aed;
  --qmom: #059669;
  --sm: #d97706;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* ─── HEADER ─────────────────────────────────────── */
.site-header {
  background: var(--ink);
  color: #fff;
  padding: 2rem 2.5rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 1rem;
  justify-content: space-between;
}

.header-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  font-weight: 700;
  line-height: 1.15;
}
.header-title p {
  font-size: 0.8rem;
  font-weight: 300;
  opacity: 0.6;
  margin-top: 0.3rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-stats {
  display: flex;
  gap: 2rem;
}
.stat { text-align: right; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: #f59e0b;
  line-height: 1;
}
.stat-label {
  font-size: 0.7rem;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ─── CONTROLS ───────────────────────────────────── */
.controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: center;
}

.controls label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: 0.3rem;
}

.controls select {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.82rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.35rem 0.6rem;
  color: var(--ink);
  cursor: pointer;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.35rem 0.7rem;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}
.search-box input {
  border: none;
  background: transparent;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.82rem;
  color: var(--ink);
  width: 100%;
  outline: none;
}
.search-box input::placeholder { color: var(--ink-muted); }
.search-icon { color: var(--ink-muted); font-size: 0.85rem; }

/* ─── AREA LEGEND ────────────────────────────────── */
.legend-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
.legend-bar span {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: 0.4rem;
}
.legend-chip {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  border: 2px solid transparent;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  user-select: none;
}
.legend-chip:hover { transform: scale(1.04); }
.legend-chip.off { opacity: 0.25; }
.legend-chip[data-area="MM & IS"]        { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
.legend-chip[data-area="FAC & OBHR"]     { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
.legend-chip[data-area="QMOM & HLAM"]   { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
.legend-chip[data-area="SM & Economics"] { background: #fef3c7; color: #92400e; border-color: #fcd34d; }

/* ─── MONTH NAV ──────────────────────────────────── */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2rem 0.8rem;
  max-width: 1200px;
  margin: 0 auto;
}
.month-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  font-weight: 700;
  color: var(--ink);
}
.month-count {
  font-size: 0.78rem;
  color: var(--ink-muted);
  font-weight: 400;
  margin-left: 0.6rem;
}
.nav-btns { display: flex; gap: 0.4rem; }
.nav-btn {
  width: 36px; height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: var(--surface);
  cursor: pointer;
  font-size: 1rem;
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

/* Month tab dots */
.month-tabs {
  display: flex;
  gap: 0.4rem;
  padding: 0 2rem 0.8rem;
  max-width: 1200px;
  margin: 0 auto;
}
.month-tab {
  padding: 0.25rem 0.9rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
  border: 1.5px solid var(--border);
  cursor: pointer;
  background: var(--surface);
  color: var(--ink-muted);
  transition: all 0.15s;
}
.month-tab:hover { border-color: var(--accent); color: var(--accent); }
.month-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ─── CALENDAR ───────────────────────────────────── */
.calendar-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem 3rem;
}

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}
.wday {
  text-align: center;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  text-transform: uppercase;
  padding: 0.3rem 0;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.day-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  min-height: 110px;
  padding: 0.4rem 0.4rem 0.35rem;
  position: relative;
  transition: border-color 0.15s;
}
.day-cell:hover { border-color: #bbb; }
.day-cell.empty { background: transparent; border-color: transparent; pointer-events: none; }
.day-cell.has-events { border-color: #d0ccc8; }
.day-cell.today { border-color: var(--today-ring) !important; border-width: 2px; }

.day-num {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink-muted);
  line-height: 1;
  margin-bottom: 0.35rem;
  display: flex;
  align-items: center;
  gap: 0.25rem;
}
.today .day-num .num-badge {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.72rem;
}

.event-tag {
  display: block;
  font-size: 0.6rem;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  line-height: 1.45;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 3px solid transparent;
  transition: filter 0.15s;
}
.event-tag:hover { filter: brightness(0.92); }
.event-tag.hidden { display: none; }
.event-tag.area-mm      { background: #eff6ff; color: #1d4ed8; border-color: #3b82f6; }
.event-tag.area-fac     { background: #f5f3ff; color: #6d28d9; border-color: #8b5cf6; }
.event-tag.area-qmom    { background: #ecfdf5; color: #047857; border-color: #10b981; }
.event-tag.area-sm      { background: #fffbeb; color: #b45309; border-color: #f59e0b; }

.more-tag {
  font-size: 0.58rem;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 1px 0;
  font-weight: 500;
}
.more-tag:hover { color: var(--accent); }

/* ─── MODAL / DAY PANEL ──────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,10,20,0.45);
  z-index: 500;
  backdrop-filter: blur(3px);
}
.overlay.open { display: block; }

.day-panel {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--surface);
  border-radius: 14px;
  width: min(560px, 95vw);
  max-height: 82vh;
  overflow-y: auto;
  z-index: 600;
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
}
.day-panel.open { display: block; }

.panel-header {
  background: var(--ink);
  color: #fff;
  padding: 1.2rem 1.5rem;
  border-radius: 14px 14px 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-date {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
}
.panel-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 1.3rem;
  cursor: pointer;
  line-height: 1;
  transition: color 0.15s;
}
.panel-close:hover { color: #fff; }

.panel-body { padding: 1rem 1.5rem 1.5rem; }

.time-group { margin-bottom: 1.2rem; }
.time-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.5rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
}

.session-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 0.75rem 0.9rem;
  margin-bottom: 0.5rem;
  border-left: 4px solid transparent;
}
.session-card.area-mm   { border-color: #3b82f6; }
.session-card.area-fac  { border-color: #8b5cf6; }
.session-card.area-qmom { border-color: #10b981; }
.session-card.area-sm   { border-color: #f59e0b; }

.session-course {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.25rem;
  line-height: 1.3;
}
.session-meta {
  font-size: 0.75rem;
  color: var(--ink-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
.session-meta .badge {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 999px;
}
.badge.area-mm   { background: #dbeafe; color: #1e40af; }
.badge.area-fac  { background: #ede9fe; color: #5b21b6; }
.badge.area-qmom { background: #d1fae5; color: #065f46; }
.badge.area-sm   { background: #fef3c7; color: #92400e; }
.code-badge {
  font-family: monospace;
  font-size: 0.68rem;
  background: var(--border);
  padding: 1px 5px;
  border-radius: 3px;
}

/* ─── LIST VIEW ──────────────────────────────────── */
.view-toggle {
  display: flex;
  gap: 0.3rem;
  margin-left: auto;
}
.vtbtn {
  padding: 0.3rem 0.75rem;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.vtbtn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.list-view {
  display: none;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem 3rem;
}
.list-view.visible { display: block; }

.list-day-block { margin-bottom: 1.5rem; }
.list-day-head {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  padding: 0.5rem 0;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 0.5rem;
  display: flex;
  gap: 0.8rem;
  align-items: baseline;
}
.list-day-wday {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

.list-row {
  display: grid;
  grid-template-columns: 160px 1fr auto;
  gap: 0.8rem;
  align-items: start;
  padding: 0.55rem 0.75rem;
  border-radius: 6px;
  margin-bottom: 2px;
  transition: background 0.1s;
}
.list-row:hover { background: #eeecea; }
.list-row.hidden { display: none; }

.list-time {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--accent);
  padding-top: 1px;
}
.list-course {
  font-size: 0.82rem;
  font-weight: 500;
  line-height: 1.35;
}
.list-faculty {
  font-size: 0.72rem;
  color: var(--ink-muted);
}
.list-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: flex-end; align-items: flex-start; padding-top: 1px; }

/* ─── RESPONSIVE ─────────────────────────────────── */
@media (max-width: 700px) {
  .site-header { padding: 1.2rem 1rem; }
  .controls { padding: 0.75rem 1rem; }
  .legend-bar { padding: 0.5rem 1rem; }
  .calendar-wrap, .list-view { padding: 0 0.75rem 2rem; }
  .month-nav, .month-tabs { padding-left: 0.75rem; padding-right: 0.75rem; }
  .day-cell { min-height: 72px; }
  .list-row { grid-template-columns: 1fr; gap: 0.2rem; }
  .list-badges { justify-content: flex-start; }
  .header-stats { display: none; }
}

/* ─── SUBJECT MULTI-SELECT ─────────────────────── */
.subject-filter-wrap {
  position: relative;
}

.subject-filter-btn {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.82rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.35rem 0.7rem;
  color: var(--ink);
  cursor: pointer;
  min-width: 200px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  white-space: nowrap;
}

.subject-filter-btn span {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 600;
}

.subject-filter-panel {
  display: none;
  position: absolute;
  top: calc(100% + 0.4rem);
  left: 0;
  width: min(360px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 14px 36px rgba(0,0,0,0.15);
  padding: 0.8rem;
  max-height: 60vh;
  overflow-y: auto;
  z-index: 1000;
}

.subject-filter-panel.open {
  display: block;
}

.subject-filter-actions {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}

.subject-filter-actions button {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--accent);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
}

.subject-filter-list {
  max-height: 280px;
  overflow-y: auto;
  display: grid;
  gap: 0.25rem;
}

.subject-option {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  font-size: 0.76rem;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid transparent;
  border-radius: 7px;
  padding: 0.4rem 0.5rem;
  cursor: pointer;
}

.subject-option:hover {
  border-color: var(--border);
}

.subject-option input {
  margin-top: 0.2rem;
  accent-color: var(--accent);
  flex-shrink: 0;
}

.subject-option span {
  line-height: 1.35;
}

.subject-option small {
  display: block;
  color: var(--ink-muted);
  font-size: 0.63rem;
  margin-top: 0.08rem;
}

@media (max-width: 700px) {
  .subject-filter-wrap {
    width: 100%;
  }

  .subject-filter-btn {
    width: 100%;
    min-width: 0;
  }

  .subject-filter-panel {
    width: 100%;
  }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-title">
    <h1>EPGP17 · Quarter VI<br>Platform Schedule</h1>
    <p>20 April 2026 – 31 July 2026</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="statSessions">262</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-num">32</div>
      <div class="stat-label">Courses</div>
    </div>
    <div class="stat">
      <div class="stat-num">4</div>
      <div class="stat-label">Months</div>
    </div>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div>
    <label for="filterFaculty">Faculty</label>
    <select id="filterFaculty">
      <option value="">All Faculty</option>
    </select>
  </div>

  <div class="subject-filter-wrap">
    <label>Subjects</label>
    <button type="button" class="subject-filter-btn" id="subjectFilterBtn" aria-expanded="false">
      Select subjects <span id="subjectFilterCount">All</span>
    </button>
    <div class="subject-filter-panel" id="subjectFilterPanel">
      <div class="subject-filter-actions">
        <button type="button" id="subjectSelectAll">Select all</button>
        <button type="button" id="subjectClearAll">Clear all</button>
      </div>
      <div class="subject-filter-list" id="subjectFilterList"></div>
    </div>
  </div>

  <div>
    <label for="filterTime">Time</label>
    <select id="filterTime">
      <option value="">Any Time</option>
      <option value="09.00 AM">09:00 AM</option>
      <option value="12.15 PM">12:15 PM</option>
      <option value="03.30 PM">03:30 PM</option>
      <option value="07.00 PM">07:00 PM</option>
    </select>
  </div>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input id="searchBox" type="text" placeholder="Search course, faculty, code…">
  </div>

  <div class="view-toggle">
    <button class="vtbtn active" id="btnCal" onclick="setView('cal')">📅 Calendar</button>
    <button class="vtbtn" id="btnList" onclick="setView('list')">☰ List</button>
  </div>
</div>

<!-- AREA LEGEND -->
<div class="legend-bar">
  <span>Area</span>
  <div class="legend-chip" data-area="MM & IS" onclick="toggleArea(this)">● MM &amp; IS</div>
  <div class="legend-chip" data-area="FAC & OBHR" onclick="toggleArea(this)">● FAC &amp; OBHR</div>
  <div class="legend-chip" data-area="QMOM & HLAM" onclick="toggleArea(this)">● QMOM &amp; HLAM</div>
  <div class="legend-chip" data-area="SM & Economics" onclick="toggleArea(this)">● SM &amp; Economics</div>
</div>

<!-- CALENDAR VIEW -->
<div id="calView">
  <div class="month-nav">
    <div>
      <span class="month-name" id="monthName"></span>
      <span class="month-count" id="monthCount"></span>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prevBtn" onclick="changeMonth(-1)">←</button>
      <button class="nav-btn" id="nextBtn" onclick="changeMonth(1)">→</button>
    </div>
  </div>
  <div class="month-tabs" id="monthTabs"></div>
  <div class="calendar-wrap">
    <div class="weekday-row">
      <div class="wday">Sun</div><div class="wday">Mon</div><div class="wday">Tue</div>
      <div class="wday">Wed</div><div class="wday">Thu</div><div class="wday">Fri</div><div class="wday">Sat</div>
    </div>
    <div class="calendar-grid" id="calGrid"></div>
  </div>
</div>

<!-- LIST VIEW -->
<div class="list-view" id="listView">
  <div id="listContent"></div>
</div>

<!-- DAY MODAL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="day-panel" id="dayPanel">
  <div class="panel-header">
    <div class="panel-date" id="panelDate"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>

let currentMonth = 0;
let activeSubjects = null;
let activeAreas = new Set(['MM & IS','FAC & OBHR','QMOM & HLAM','SM & Economics']);
let currentView = 'cal';

// Populate filters
const facSet = new Set(), courseSet = new Set();
EVENTS.forEach(e => {
  facSet.add(e.faculty);
  courseSet.add(e.course);
});

const fSel = document.getElementById('filterFaculty');
const subjectFilterBtn = document.getElementById('subjectFilterBtn');
const subjectFilterPanel = document.getElementById('subjectFilterPanel');
const subjectFilterList = document.getElementById('subjectFilterList');
const subjectFilterCount = document.getElementById('subjectFilterCount');

[...facSet].sort().forEach(f => {
  const o = document.createElement('option');
  o.value = f;
  o.textContent = f;
  fSel.appendChild(o);
});

const sortedCourses = [...courseSet].sort();

function updateSubjectSummary() {
  const total = sortedCourses.length;
  const selected = activeSubjects ? activeSubjects.size : total;
  subjectFilterCount.textContent = selected === total ? 'All' : `${selected} selected`;
}

function renderSubjectOptions() {
  subjectFilterList.innerHTML = '';

  sortedCourses.forEach(course => {
    const id = 'sub-' + course.replace(/[^a-z0-9]+/gi, '-').toLowerCase();
    const label = document.createElement('label');
    label.className = 'subject-option';
    label.htmlFor = id;

    const checked = !activeSubjects || activeSubjects.has(course);

    label.innerHTML = `
      <input type="checkbox" id="${id}" ${checked ? 'checked' : ''}>
      <span>${course}<small>Toggle in calendar &amp; list view</small></span>
    `;

    label.querySelector('input').addEventListener('change', ev => {
      if (!activeSubjects) activeSubjects = new Set(sortedCourses);

      if (ev.target.checked) activeSubjects.add(course);
      else activeSubjects.delete(course);

      if (activeSubjects.size === sortedCourses.length) activeSubjects = null;

      updateSubjectSummary();
      renderCalendar();
      if (currentView === 'list') renderList();
    });

    subjectFilterList.appendChild(label);
  });

  updateSubjectSummary();
}

renderSubjectOptions();

subjectFilterBtn.addEventListener('click', () => {
  const open = subjectFilterPanel.classList.toggle('open');
  subjectFilterBtn.setAttribute('aria-expanded', String(open));
});

document.getElementById('subjectSelectAll').addEventListener('click', () => {
  activeSubjects = null;
  renderSubjectOptions();
  renderCalendar();
  if (currentView === 'list') renderList();
});

document.getElementById('subjectClearAll').addEventListener('click', () => {
  activeSubjects = new Set();
  renderSubjectOptions();
  renderCalendar();
  if (currentView === 'list') renderList();
});

document.addEventListener('click', e => {
  if (!subjectFilterPanel.contains(e.target) && !subjectFilterBtn.contains(e.target)) {
    subjectFilterPanel.classList.remove('open');
    subjectFilterBtn.setAttribute('aria-expanded', 'false');
  }
});


// Month tabs
const tabsEl = document.getElementById('monthTabs');
MONTHS.forEach((m,i) => {
  const t = document.createElement('button');
  t.className = 'month-tab' + (i===0?' active':'');
  t.textContent = m.name;
  t.dataset.idx = i;
  t.onclick = () => { currentMonth = i; buildMonthTabs(); renderCalendar(); };
  tabsEl.appendChild(t);
});

function getFiltered() {
  const fv = fSel.value;
  const tv = document.getElementById('filterTime').value;
  const sq = document.getElementById('searchBox').value.toLowerCase().trim();

  return EVENTS.filter(e => {
    if (!activeAreas.has(e.area)) return false;
    if (fv && e.faculty !== fv) return false;
    if (activeSubjects && !activeSubjects.has(e.course)) return false;
    if (tv && !e.time.startsWith(tv)) return false;
    if (
      sq &&
      !e.course.toLowerCase().includes(sq) &&
      !e.faculty.toLowerCase().includes(sq) &&
      !e.code.toLowerCase().includes(sq)
    ) return false;

    return true;
  });
}

function renderCalendar() {
  const {name, year, month} = MONTHS[currentMonth];
  const filtered = getFiltered();
  const today = new Date();

  // Count for this month
  const cnt = filtered.filter(e => e.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length;
  document.getElementById('monthName').textContent = `${name} 2026`;
  document.getElementById('monthCount').textContent = cnt ? `(${cnt} sessions)` : '';

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  // Build event map
  const map = {};
  filtered.forEach(e => {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  });

  for (let i=0;i<firstDay;i++) {
    const d=document.createElement('div'); d.className='day-cell empty'; grid.appendChild(d);
  }

  for (let d=1;d<=daysInMonth;d++) {
    const mm = String(month+1).padStart(2,'0');
    const dd = String(d).padStart(2,'0');
    const key = `${year}-${mm}-${dd}`;
    const evs = map[key] || [];

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (evs.length?' has-events':'');

    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    if (isToday) cell.classList.add('today');

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    if (isToday) numDiv.innerHTML = `<span class="num-badge">${d}</span>`;
    else numDiv.textContent = d;
    cell.appendChild(numDiv);

    const MAX=3;
    evs.slice(0,MAX).forEach(ev => {
      const tag = document.createElement('span');
      tag.className = `event-tag ${AREA_CLASS[ev.area]}`;
      tag.textContent = SHORT[ev.course] || ev.course;
      tag.title = `${ev.course} · ${ev.time}`;
      tag.onclick = (e) => { e.stopPropagation(); openPanel(key, name); };
      cell.appendChild(tag);
    });

    if (evs.length > MAX) {
      const more = document.createElement('div');
      more.className = 'more-tag';
      more.textContent = `+${evs.length-MAX} more`;
      more.onclick = () => openPanel(key, name);
      cell.appendChild(more);
    }

    if (evs.length) cell.style.cursor='pointer';
    cell.onclick = () => { if (evs.length) openPanel(key, name); };

    grid.appendChild(cell);
  }

  // Update stats counter
  document.getElementById('statSessions').textContent = filtered.length;
}

function openPanel(dateKey, monthName) {
  const evs = getFiltered().filter(e => e.date === dateKey);
  if (!evs.length) return;

  const [y,m,d] = dateKey.split('-');
  const dt = new Date(+y,+m-1,+d);
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('panelDate').textContent = `${dayNames[dt.getDay()]}, ${d} ${monthName} ${y}`;

  // Group by time
  const byTime = {};
  evs.forEach(e => {
    if (!byTime[e.time]) byTime[e.time] = [];
    byTime[e.time].push(e);
  });
  const sortedTimes = Object.keys(byTime).sort();

  let html = '';
  sortedTimes.forEach(t => {
    html += `<div class="time-group"><div class="time-label">${t.replace(/\./g,':')}</div>`;
    byTime[t].forEach(ev => {
      html += `<div class="session-card ${AREA_CLASS[ev.area]}">
        <div class="session-course">${ev.course}</div>
        <div class="session-meta">
          <span>👤 ${ev.faculty}</span>
          <span class="badge ${AREA_CLASS[ev.area]}">${ev.area}</span>
          <span class="code-badge">${ev.code}</span>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('dayPanel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('dayPanel').classList.remove('open');
}

function changeMonth(dir) {
  currentMonth = Math.max(0, Math.min(MONTHS.length-1, currentMonth+dir));
  buildMonthTabs();
  renderCalendar();
}

function toggleArea(el) {
  const area = el.dataset.area;
  if (activeAreas.has(area)) { activeAreas.delete(area); el.classList.add('off'); }
  else { activeAreas.add(area); el.classList.remove('off'); }
  renderCalendar();
  if (currentView==='list') renderList();
}

function setView(v) {
  currentView = v;
  document.getElementById('btnCal').classList.toggle('active', v==='cal');
  document.getElementById('btnList').classList.toggle('active', v==='list');
  document.getElementById('calView').style.display = v==='cal'?'block':'none';
  document.getElementById('listView').classList.toggle('visible', v==='list');
  if (v==='list') renderList();
}

function renderList() {
  const filtered = getFiltered();
  // Group by date
  const byDate = {};
  filtered.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });
  const dates = Object.keys(byDate).sort();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let html = '';
  dates.forEach(dk => {
    const [y,m,d] = dk.split('-');
    const dt = new Date(+y,+m-1,+d);
    const evs = byDate[dk].sort((a,b)=>a.time.localeCompare(b.time));
    html += `<div class="list-day-block">
      <div class="list-day-head">
        ${d} ${months[+m-1]} ${y}
        <span class="list-day-wday">${days[dt.getDay()]}</span>
      </div>`;
    evs.forEach(ev => {
      html += `<div class="list-row">
        <div class="list-time">${ev.time.replace(/\./g,':')}</div>
        <div>
          <div class="list-course">${ev.course}</div>
          <div class="list-faculty">${ev.faculty} · <span class="code-badge">${ev.code}</span></div>
        </div>
        <div class="list-badges">
          <span class="badge ${AREA_CLASS[ev.area]}">${ev.area}</span>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  if (!html) html = '<p style="padding:2rem;color:var(--ink-muted)">No sessions match your filters.</p>';
  document.getElementById('listContent').innerHTML = html;
}

// Bind filter changes
['filterFaculty','filterTime','searchBox'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    renderCalendar();
    if (currentView==='list') renderList();
  });
});

// Keyboard close
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

// Init
buildMonthTabs();
renderCalendar();
</script>
</body>
</html>
