<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPGP17 · Quarter VI Platform Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --ink: #1a1a2e;
  --ink-muted: #6b6b80;
  --border: #e2dfd8;
  --accent: #c8502a;
  --today-ring: #c8502a;

  --mm: #2563eb;
  --fac: #7c3aed;
  --qmom: #059669;
  --sm: #d97706;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

.site-header {
  background: var(--ink);
  color: #fff;
  padding: 2rem 2.5rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 1rem;
  justify-content: space-between;
}

.header-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  font-weight: 700;
  line-height: 1.15;
}
.header-title p {
  font-size: 0.8rem;
  font-weight: 300;
  opacity: 0.6;
  margin-top: 0.3rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-stats {
  display: flex;
  gap: 2rem;
}
.stat { text-align: right; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: #f59e0b;
  line-height: 1;
}
.stat-label {
  font-size: 0.7rem;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: center;
}

.controls label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: 0.3rem;
}

.controls select {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.82rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.35rem 0.6rem;
  color: var(--ink);
  cursor: pointer;
}

.subject-filter-wrap {
  position: relative;
  min-width: 240px;
}

.subject-filter-btn {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.82rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.45rem 0.7rem;
  color: var(--ink);
  cursor: pointer;
  min-width: 240px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
}

.subject-filter-btn span {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 600;
}

.subject-filter-panel {
  display: none;
  position: absolute;
  top: calc(100% + 0.4rem);
  left: 0;
  width: min(360px, 92vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 14px 36px rgba(0,0,0,0.12);
  padding: 0.8rem;
  z-index: 50;
}

.subject-filter-panel.open { display: block; }

.subject-filter-actions {
  display: flex;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 0.7rem;
}

.subject-filter-actions button {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--accent);
  background: transparent;
  border: none;
  cursor: pointer;
}

.subject-filter-list {
  max-height: 260px;
  overflow: auto;
  display: grid;
  gap: 0.35rem;
}

.subject-option {
  display: flex;
  align-items: flex-start;
  gap: 0.55rem;
  font-size: 0.76rem;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 0.45rem 0.55rem;
  cursor: pointer;
}

.subject-option:hover { border-color: var(--border); }

.subject-option input {
  margin-top: 0.18rem;
  accent-color: var(--accent);
}

.subject-option small {
  display: block;
  color: var(--ink-muted);
  font-size: 0.66rem;
  margin-top: 0.12rem;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.35rem 0.7rem;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}
.search-box input {
  border: none;
  background: transparent;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.82rem;
  color: var(--ink);
  width: 100%;
  outline: none;
}
.search-box input::placeholder { color: var(--ink-muted); }
.search-icon { color: var(--ink-muted); font-size: 0.85rem; }

.legend-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
.legend-bar span {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: 0.4rem;
}
.legend-chip {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  border: 2px solid transparent;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  user-select: none;
}
.legend-chip:hover { transform: scale(1.04); }
.legend-chip.off { opacity: 0.25; }
.legend-chip[data-area="MM & IS"] { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
.legend-chip[data-area="FAC & OBHR"] { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
.legend-chip[data-area="QMOM & HLAM"] { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
.legend-chip[data-area="SM & Economics"] { background: #fef3c7; color: #92400e; border-color: #fcd34d; }

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2rem 0.8rem;
  max-width: 1200px;
  margin: 0 auto;
}
.month-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  font-weight: 700;
  color: var(--ink);
}
.month-count {
  font-size: 0.78rem;
  color: var(--ink-muted);
  font-weight: 400;
  margin-left: 0.6rem;
}
.nav-btns { display: flex; gap: 0.4rem; }
.nav-btn {
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: var(--surface);
  cursor: pointer;
  font-size: 1rem;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

.month-tabs {
  display: flex;
  gap: 0.4rem;
  padding: 0 2rem 0.8rem;
  max-width: 1200px;
  margin: 0 auto;
}
.month-tab {
  padding: 0.25rem 0.9rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
  border: 1.5px solid var(--border);
  cursor: pointer;
  background: var(--surface);
  color: var(--ink-muted);
  transition: all 0.15s;
}
.month-tab:hover { border-color: var(--accent); color: var(--accent); }
.month-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.calendar-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem 3rem;
}

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}
.wday {
  text-align: center;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  text-transform: uppercase;
  padding: 0.3rem 0;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.day-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  min-height: 110px;
  padding: 0.4rem 0.4rem 0.35rem;
  position: relative;
  transition: border-color 0.15s;
}
.day-cell:hover { border-color: #bbb; }
.day-cell.empty {
  background: transparent;
  border-color: transparent;
  pointer-events: none;
}
.day-cell.has-events { border-color: #d0ccc8; }
.day-cell.today {
  border-color: var(--today-ring) !important;
  border-width: 2px;
}
.day-num {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink-muted);
  line-height: 1;
  margin-bottom: 0.35rem;
  display: flex;
  align-items: center;
  gap: 0.25rem;
}
.today .day-num .num-badge {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
}
.event-tag {
  display: block;
  font-size: 0.6rem;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  line-height: 1.45;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 3px solid transparent;
  transition: filter 0.15s;
}
.event-tag:hover { filter: brightness(0.92); }
.event-tag.hidden { display: none; }
.event-tag.area-mm { background: #eff6ff; color: #1d4ed8; border-color: #3b82f6; }
.event-tag.area-fac { background: #f5f3ff; color: #6d28d9; border-color: #8b5cf6; }
.event-tag.area-qmom { background: #ecfdf5; color: #047857; border-color: #10b981; }
.event-tag.area-sm { background: #fffbeb; color: #b45309; border-color: #f59e0b; }
.more-tag {
  font-size: 0.58rem;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 1px 0;
  font-weight: 500;
}
.more-tag:hover { color: var(--accent); }

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,10,20,0.45);
  z-index: 500;
  backdrop-filter: blur(3px);
}
.overlay.open { display: block; }

.day-panel {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--surface);
  border-radius: 14px;
  width: min(560px, 95vw);
  max-height: 82vh;
  overflow-y: auto;
  z-index: 600;
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
}
.day-panel.open { display: block; }

.panel-header {
  background: var(--ink);
  color: #fff;
  padding: 1.2rem 1.5rem;
  border-radius: 14px 14px 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-date {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
}
.panel-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 1.3rem;
  cursor: pointer;
  line-height: 1;
  transition: color 0.15s;
}
.panel-close:hover { color: #fff; }

.panel-body { padding: 1rem 1.5rem 1.5rem; }
.time-group { margin-bottom: 1.2rem; }
.time-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.5rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
}
.session-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 0.75rem 0.9rem;
  margin-bottom: 0.5rem;
  border-left: 4px solid transparent;
}
.session-card.area-mm { border-color: #3b82f6; }
.session-card.area-fac { border-color: #8b5cf6; }
.session-card.area-qmom { border-color: #10b981; }
.session-card.area-sm { border-color: #f59e0b; }
.session-course {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.25rem;
  line-height: 1.3;
}
.session-meta {
  font-size: 0.75rem;
  color: var(--ink-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
.session-meta .badge {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 999px;
}
.badge.area-mm { background: #dbeafe; color: #1e40af; }
.badge.area-fac { background: #ede9fe; color: #5b21b6; }
.badge.area-qmom { background: #d1fae5; color: #065f46; }
.badge.area-sm { background: #fef3c7; color: #92400e; }
.code-badge {
  font-family: monospace;
  font-size: 0.68rem;
  background: var(--border);
  padding: 1px 5px;
  border-radius: 3px;
}

.view-toggle { display: flex; gap: 0.3rem; margin-left: auto; }
.vtbtn {
  padding: 0.3rem 0.75rem;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.vtbtn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.list-view {
  display: none;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem 3rem;
}
.list-view.visible { display: block; }
.list-day-block { margin-bottom: 1.5rem; }
.list-day-head {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  padding: 0.5rem 0;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 0.5rem;
  display: flex;
  gap: 0.8rem;
  align-items: baseline;
}
.list-day-wday {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.list-row {
  display: grid;
  grid-template-columns: 160px 1fr auto;
  gap: 0.8rem;
  align-items: start;
  padding: 0.55rem 0.75rem;
  border-radius: 6px;
  margin-bottom: 2px;
  transition: background 0.1s;
}
.list-row:hover { background: #eeecea; }
.list-row.hidden { display: none; }
.list-time {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--accent);
  padding-top: 1px;
}
.list-course {
  font-size: 0.82rem;
  font-weight: 500;
  line-height: 1.35;
}
.list-faculty {
  font-size: 0.72rem;
  color: var(--ink-muted);
}
.list-badges {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
  justify-content: flex-end;
  align-items: flex-start;
  padding-top: 1px;
}

@media (max-width: 700px) {
  .site-header { padding: 1.2rem 1rem; }
  .controls { padding: 0.75rem 1rem; }
  .legend-bar { padding: 0.5rem 1rem; }
  .calendar-wrap, .list-view { padding: 0 0.75rem 2rem; }
  .month-nav, .month-tabs { padding-left: 0.75rem; padding-right: 0.75rem; }
  .day-cell { min-height: 72px; }
  .list-row { grid-template-columns: 1fr; gap: 0.2rem; }
  .list-badges { justify-content: flex-start; }
  .header-stats { display: none; }
  .subject-filter-wrap { width: 100%; }
  .subject-filter-btn, .subject-filter-panel { width: 100%; min-width: 0; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-title">
    <h1>EPGP17 Quarter VI<br>Platform Schedule</h1>
    <p>20 April 2026 — 31 July 2026</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="statSessions">262</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-num">32</div>
      <div class="stat-label">Courses</div>
    </div>
    <div class="stat">
      <div class="stat-num">4</div>
      <div class="stat-label">Months</div>
    </div>
  </div>
</header>

<div class="controls">
  <div>
    <label for="filterFaculty">Faculty</label>
    <select id="filterFaculty"><option value="">All Faculty</option></select>
  </div>

  <div class="subject-filter-wrap">
    <label>Subjects</label>
    <button type="button" class="subject-filter-btn" id="subjectFilterBtn" aria-expanded="false">
      <span id="subjectFilterLabel">All Subjects</span>
      <span id="subjectFilterCount">All</span>
    </button>
    <div class="subject-filter-panel" id="subjectFilterPanel">
      <div class="subject-filter-actions">
        <button type="button" id="subjectSelectAll">Select all</button>
        <button type="button" id="subjectClearAll">Clear all</button>
      </div>
      <div class="subject-filter-list" id="subjectFilterList"></div>
    </div>
  </div>

  <div>
    <label for="filterTime">Time</label>
    <select id="filterTime">
      <option value="">Any Time</option>
      <option value="09.00 AM">09:00 AM</option>
      <option value="12.15 PM">12:15 PM</option>
      <option value="03.30 PM">03:30 PM</option>
      <option value="07.00 PM">07:00 PM</option>
    </select>
  </div>

  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input id="searchBox" type="text" placeholder="Search course, faculty, code">
  </div>

  <div class="view-toggle">
    <button class="vtbtn active" id="btnCal" onclick="setView('cal')">Calendar</button>
    <button class="vtbtn" id="btnList" onclick="setView('list')">List</button>
  </div>
</div>

<div class="legend-bar">
  <span>Area</span>
  <div class="legend-chip" data-area="MM & IS" onclick="toggleArea(this)">MM & IS</div>
  <div class="legend-chip" data-area="FAC & OBHR" onclick="toggleArea(this)">FAC & OBHR</div>
  <div class="legend-chip" data-area="QMOM & HLAM" onclick="toggleArea(this)">QMOM & HLAM</div>
  <div class="legend-chip" data-area="SM & Economics" onclick="toggleArea(this)">SM & Economics</div>
</div>

<div id="calView">
  <div class="month-nav">
    <div>
      <span class="month-name" id="monthName"></span>
      <span class="month-count" id="monthCount"></span>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prevBtn" onclick="changeMonth(-1)">‹</button>
      <button class="nav-btn" id="nextBtn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="month-tabs" id="monthTabs"></div>

  <div class="calendar-wrap">
    <div class="weekday-row">
      <div class="wday">Sun</div>
      <div class="wday">Mon</div>
      <div class="wday">Tue</div>
      <div class="wday">Wed</div>
      <div class="wday">Thu</div>
      <div class="wday">Fri</div>
      <div class="wday">Sat</div>
    </div>
    <div class="calendar-grid" id="calGrid"></div>
  </div>
</div>

<div class="list-view" id="listView">
  <div id="listContent"></div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="day-panel" id="dayPanel">
  <div class="panel-header">
    <div class="panel-date" id="panelDate"></div>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
const EVENTS = [
  { sl:1, faculty:"Prof. Anandakuttan B Unnithan", track:"2", area:"MM & IS", code:"EMM-004", course:"Digital Product Management", date:"2026-04-20", time:"07.00 PM - 09.45 PM", remarks:"" },
  { sl:2, faculty:"Prof. Sreejesh S", track:"3", area:"MM & IS", code:"EMM-003", course:"Digital Marketing", date:"2026-04-20", time:"07.00 PM - 09.45 PM", remarks:"" },
  { sl:3, faculty:"Prof. Aishwarya Ramasundaram", track:"1", area:"MM & IS", code:"EMM-016", course:"Sales and Distribution Management - Section A", date:"2026-04-20", time:"07.00 PM - 09.45 PM", remarks:"" },
  { sl:4, faculty:"Prof. M P Sebastian", track:"4", area:"MM & IS", code:"EIS-008", course:"Natural Language Processing", date:"2026-04-21", time:"07.00 PM - 09.45 PM", remarks:"" },
  { sl:5, faculty:"Prof. Priya Nair Rajeev", track:"2", area:"FAC & OBHR", code:"EOBHR-003", course:"Emotional Intelligence for Managerial Effectiveness - Section A", date:"2026-04-22", time:"07.00 PM - 09.45 PM", remarks:"" },

const facultySet = [...new Set(EVENTS.map(e => e.faculty))].sort();
const courseSet = [...new Set(EVENTS.map(e => e.course))].sort();

facultySet.forEach(f => {
  const o = document.createElement("option");
  o.value = f;
  o.textContent = f;
  fSel.appendChild(o);
});

function updateSubjectSummary() {
  const total = courseSet.length;
  const selected = activeSubjects ? activeSubjects.size : total;
  subjectFilterCount.textContent = selected === total ? "All" : `${selected} selected`;
  subjectFilterLabel.textContent = selected === total ? "All Subjects" : "Selected Subjects";
}

function renderSubjectOptions() {
  subjectFilterList.innerHTML = "";
  courseSet.forEach(course => {
    const id = `sub-${course.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}`;
    const label = document.createElement("label");
    label.className = "subject-option";
    label.htmlFor = id;
    const checked = !activeSubjects || activeSubjects.has(course);

    label.innerHTML = `
      <input type="checkbox" id="${id}" ${checked ? "checked" : ""}>
      <span>${course}<small>Show this subject in calendar and list view</small></span>
    `;

    const input = label.querySelector("input");
    input.addEventListener("change", () => {
      if (!activeSubjects) activeSubjects = new Set(courseSet);
      if (input.checked) activeSubjects.add(course);
      else activeSubjects.delete(course);
      if (activeSubjects.size === courseSet.length) activeSubjects = null;
      updateSubjectSummary();
      renderCalendar();
      if (currentView === "list") renderList();
    });

    subjectFilterList.appendChild(label);
  });
  updateSubjectSummary();
}

subjectFilterBtn.addEventListener("click", () => {
  const open = subjectFilterPanel.classList.toggle("open");
  subjectFilterBtn.setAttribute("aria-expanded", open ? "true" : "false");
});

document.getElementById("subjectSelectAll").addEventListener("click", () => {
  activeSubjects = null;
  renderSubjectOptions();
  renderCalendar();
  if (currentView === "list") renderList();
});

document.getElementById("subjectClearAll").addEventListener("click", () => {
  activeSubjects = new Set();
  renderSubjectOptions();
  renderCalendar();
  if (currentView === "list") renderList();
});

document.addEventListener("click", (e) => {
  if (!subjectFilterPanel.contains(e.target) && !subjectFilterBtn.contains(e.target)) {
    subjectFilterPanel.classList.remove("open");
    subjectFilterBtn.setAttribute("aria-expanded", "false");
  }
});

function fmtDate(dStr) {
  const d = new Date(dStr + "T00:00:00");
  return d.toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
}

function shortDay(dStr) {
  const d = new Date(dStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday:"short" });
}

function getFiltered() {
  const fv = fSel.value;
  const tv = tSel.value;
  const sq = searchBox.value.trim().toLowerCase();

  return EVENTS.filter(e => {
    if (!activeAreas.has(e.area)) return false;
    if (fv && e.faculty !== fv) return false;
    if (activeSubjects && !activeSubjects.has(e.course)) return false;
    if (tv && !e.time.startsWith(tv)) return false;
    if (sq && !e.course.toLowerCase().includes(sq) && !e.faculty.toLowerCase().includes(sq) && !e.code.toLowerCase().includes(sq)) return false;
    return true;
  });
}

function renderMonthTabs() {
  monthTabs.innerHTML = "";
  monthNames.forEach((m, i) => {
    const b = document.createElement("button");
    b.className = "month-tab" + (i === currentMonth ? " active" : "");
    b.textContent = m.split(" ")[0];
    b.onclick = () => { currentMonth = i; renderCalendar(); };
    monthTabs.appendChild(b);
  });
}

function renderCalendar() {
  const monthIndex = monthMap[currentMonth];
  monthName.textContent = monthNames[currentMonth];
  const filtered = getFiltered();
  const monthEvents = filtered.filter(e => new Date(e.date).getMonth() === monthIndex);

  monthCount.textContent = `${monthEvents.length} sessions`;
  prevBtn.disabled = currentMonth === 0;
  nextBtn.disabled = currentMonth === monthMap.length - 1;
  renderMonthTabs();

  const year = 2026;
  const first = new Date(year, monthIndex, 1);
  const last = new Date(year, monthIndex + 1, 0);
  const startDay = first.getDay();
  const totalDays = last.getDate();

  const eventsByDate = {};
  monthEvents.forEach(e => {
    if (!eventsByDate[e.date]) eventsByDate[e.date] = [];
    eventsByDate[e.date].push(e);
  });

  calGrid.innerHTML = "";

  for (let i = 0; i < startDay; i++) {
    const empty = document.createElement("div");
    empty.className = "day-cell empty";
    calGrid.appendChild(empty);
  }

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  for (let day = 1; day <= totalDays; day++) {
    const dStr = `${year}-${String(monthIndex + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const cellEvents = (eventsByDate[dStr] || []).sort((a,b) => a.time.localeCompare(b.time));

    const cell = document.createElement("div");
    cell.className = "day-cell";
    if (cellEvents.length) cell.classList.add("has-events");
    if (dStr === todayStr) cell.classList.add("today");

    const num = document.createElement("div");
    num.className = "day-num";
    num.innerHTML = dStr === todayStr
      ? `<span class="num-badge">${day}</span>`
      : `<span>${day}</span>`;
    cell.appendChild(num);

    cellEvents.slice(0, 4).forEach(ev => {
      const tag = document.createElement("div");
      tag.className = `event-tag ${AREA_CLASS[ev.area]}`;
      tag.textContent = ev.course;
      tag.title = `${ev.course} • ${ev.time}`;
      tag.onclick = (e) => { e.stopPropagation(); openDayPanel(dStr); };
      cell.appendChild(tag);
    });

    if (cellEvents.length > 4) {
      const more = document.createElement("div");
      more.className = "more-tag";
      more.textContent = `+${cellEvents.length - 4} more`;
      more.onclick = () => openDayPanel(dStr);
      cell.appendChild(more);
    }

    if (cellEvents.length) {
      cell.onclick = () => openDayPanel(dStr);
    }

    calGrid.appendChild(cell);
  }
}

function openDayPanel(dStr) {
  const dayEvents = getFiltered()
    .filter(e => e.date === dStr)
    .sort((a,b) => a.time.localeCompare(b.time));

  panelDate.textContent = fmtDate(dStr);
  panelBody.innerHTML = "";

  const grouped = {};
  dayEvents.forEach(e => {
    if (!grouped[e.time]) grouped[e.time] = [];
    grouped[e.time].push(e);
  });

  Object.keys(grouped).forEach(time => {
    const group = document.createElement("div");
    group.className = "time-group";

    const label = document.createElement("div");
    label.className = "time-label";
    label.textContent = time;
    group.appendChild(label);

    grouped[time].forEach(e => {
      const card = document.createElement("div");
      card.className = `session-card ${AREA_CLASS[e.area]}`;
      card.innerHTML = `
        <div class="session-course">${e.course}</div>
        <div class="session-meta">
          <span>${e.faculty}</span>
          <span class="code-badge">${e.code}</span>
          <span class="badge ${AREA_CLASS[e.area]}">${e.area}</span>
          <span>Track ${e.track}</span>
        </div>
      `;
      group.appendChild(card);
    });

    panelBody.appendChild(group);
  });

  overlay.classList.add("open");
  dayPanel.classList.add("open");
}

function closePanel() {
  overlay.classList.remove("open");
  dayPanel.classList.remove("open");
}

function renderList() {
  const filtered = getFiltered().sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
  listContent.innerHTML = "";

  let currentDate = "";
  let block = null;

  filtered.forEach(e => {
    if (e.date !== currentDate) {
      currentDate = e.date;
      block = document.createElement("div");
      block.className = "list-day-block";
      block.innerHTML = `
        <div class="list-day-head">
          <span>${fmtDate(e.date)}</span>
          <span class="list-day-wday">${shortDay(e.date)}</span>
        </div>
      `;
      listContent.appendChild(block);
    }

    const row = document.createElement("div");
    row.className = "list-row";
    row.innerHTML = `
      <div class="list-time">${e.time}</div>
      <div>
        <div class="list-course">${e.course}</div>
        <div class="list-faculty">${e.faculty}</div>
      </div>
      <div class="list-badges">
        <span class="code-badge">${e.code}</span>
        <span class="badge ${AREA_CLASS[e.area]}">${e.area}</span>
      </div>
    `;
    block.appendChild(row);
  });
}

function toggleArea(el) {
  const area = el.dataset.area;
  if (activeAreas.has(area)) {
    activeAreas.delete(area);
    el.classList.add("off");
  } else {
    activeAreas.add(area);
    el.classList.remove("off");
  }
  renderCalendar();
  if (currentView === "list") renderList();
}

function changeMonth(step) {
  currentMonth += step;
  if (currentMonth < 0) currentMonth = 0;
  if (currentMonth > monthMap.length - 1) currentMonth = monthMap.length - 1;
  renderCalendar();
}

function setView(view) {
  currentView = view;
  btnCal.classList.toggle("active", view === "cal");
  btnList.classList.toggle("active", view === "list");
  calView.style.display = view === "cal" ? "block" : "none";
  listView.classList.toggle("visible", view === "list");
  if (view === "list") renderList();
}

[fSel, tSel, searchBox].forEach(el => {
  el.addEventListener("input", () => {
    renderCalendar();
    if (currentView === "list") renderList();
  });
});

renderSubjectOptions();
renderCalendar();
</script>

</body>
</html>
